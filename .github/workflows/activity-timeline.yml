name: Update Activity Timeline

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */12 * * *' # runs every 12 hours

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch & Render Activity
        uses: FreddyMSchubert/github-activity-timeline@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          username: "akashverma0786"
          max_items: "10"
          event_templates: >
            {
              "push": "{{index}}. 🚀 {{actor}} pushed code to {{repo}}",
              "pr_opened": "{{index}}. 🆕 Opened PR in {{repo}}: {{payload.pull_request.title}}",
              "pr_merged": "{{index}}. 🎯 Merged PR in {{repo}}",
              "issues_opened": "{{index}}. 🐛 Opened issue in {{repo}}: {{payload.issue.title}}",
              "issue_commented": "{{index}}. 💬 Commented on issue in {{repo}}"
            }

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md && git diff --cached --quiet || git commit -m "chore: update activity"

      - uses: ad-m/github-push-action@v0.6.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: "main"